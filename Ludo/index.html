<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static Ludo Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-container {
            text-align: center;
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }

        .ludo-board {
            width: 500px;
            height: 500px;
            margin: 20px auto;
            background: #8B4513;
            position: relative;
            border: 8px solid #654321;
            border-radius: 10px;
        }

        .row {
            display: flex;
            height: 33.33%;
        }

        .cell {
            flex: 1;
            border: 2px solid #D2691E;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
        }

        .safe-zone {
            background: #FFD700 !important;
        }

        .home {
            background: #90EE90 !important;
        }

        .path-red { background: #ff4444; }
        .path-blue { background: #4444ff; }
        .path-green { background: #44ff44; }
        .path-yellow { background: #ffff44; }

        .player {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid white;
            cursor: pointer;
            transition: all 0.3s ease;
            position: absolute;
        }

        .player.red { background: #ff4444; }
        .player.blue { background: #4444ff; }
        .player.green { background: #44ff44; }
        .player.yellow { background: #ffff44; }

        .dice-container {
            margin: 20px 0;
        }

        .dice {
            width: 80px;
            height: 80px;
            margin: 0 10px;
            background: white;
            border: 4px solid #333;
            border-radius: 15px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .dice:hover {
            transform: scale(1.05);
        }

        .dice.rolling {
            animation: roll 0.6s ease-in-out;
        }

        @keyframes roll {
            0%, 100% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(90deg) scale(1.1); }
            50% { transform: rotate(180deg) scale(1.2); }
            75% { transform: rotate(270deg) scale(1.1); }
        }

        .controls {
            margin: 20px 0;
        }

        button {
            background: #4ecdc4;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            margin: 0 10px;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #45b7aa;
            transform: translateY(-2px);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            font-size: 24px;
            margin: 20px 0;
            color: #333;
            min-height: 30px;
        }

        .player-area {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .player-info {
            background: rgba(255,255,255,0.8);
            padding: 10px 20px;
            border-radius: 10px;
            margin: 5px;
        }

        .active {
            box-shadow: 0 0 20px #4ecdc4;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎲 Ludo Game 🎲</h1>
        
        <div class="ludo-board" id="board">
            <!-- Ludo board will be generated by JavaScript -->
        </div>

        <div class="dice-container">
            <div class="dice" id="dice">🎲</div>
        </div>

        <div class="controls">
            <button id="rollBtn">Roll Dice</button>
            <button id="resetBtn">Reset Game</button>
        </div>

        <div class="status" id="status">Player 1's Turn (Red)</div>

        <div class="player-area">
            <div class="player-info">
                <div>Red Player</div>
                <div id="redCount">0/4 Home</div>
            </div>
            <div class="player-info">
                <div>Blue Player</div>
                <div id="blueCount">0/4 Home</div>
            </div>
            <div class="player-info">
                <div>Green Player</div>
                <div id="greenCount">0/4 Home</div>
            </div>
            <div class="player-info">
                <div>Yellow Player</div>
                <div id="yellowCount">0/4 Home</div>
            </div>
        </div>
    </div>

    <script>
        class LudoGame {
            constructor() {
                this.currentPlayer = 0;
                this.players = ['red', 'blue', 'green', 'yellow'];
                this.playerPositions = {
                    red: [-1, -1, -1, -1],
                    blue: [-1, -1, -1, -1],
                    green: [-1, -1, -1, -1],
                    yellow: [-1, -1, -1, -1]
                };
                this.playerHomeCount = {
                    red: 0, blue: 0, green: 0, yellow: 0
                };
                this.gameBoard = [];
                this.boardCells = [];
                this.selectedPiece = null;
                this.diceValue = 0;
                this.init();
            }

            init() {
                this.createBoard();
                this.placeInitialPieces();
                this.bindEvents();
                this.updateStatus();
                this.updatePlayerCounts();
            }

            createBoard() {
                const board = document.getElementById('board');
                board.innerHTML = '';

                // Simplified 15x15 Ludo board structure
                const boardSize = 15;
                for (let i = 0; i < boardSize; i++) {
                    const row = document.createElement('div');
                    row.className = 'row';
                    
                    for (let j = 0; j < boardSize; j++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        cell.dataset.row = i;
                        cell.dataset.col = j;
                        
                        // Define special zones (simplified)
                        if ((i === 1 || i === 13) && (j === 1 || j === 13)) {
                            cell.classList.add('safe-zone');
                            cell.textContent = '★';
                        } else if (i < 5 && j < 5) {
                            cell.classList.add('home');
                            cell.style.background = '#90EE90';
                        } else if (i >= 10 && j >= 10) {
                            cell.classList.add('home');
                            cell.style.background = '#FFB6C1';
                        } else {
                            // Path cells
                            cell.classList.add(`path-${this.players[(i+j)%4]}`);
                        }
                        
                        row.appendChild(cell);
                        this.gameBoard.push(cell);
                        this.boardCells.push({row: i, col: j, element: cell});
                    }
                    board.appendChild(row);
                }
            }

            placeInitialPieces() {
                const startPositions = {
                    red: [{row: 1, col: 8}, {row: 2, col: 8}, {row: 1, col: 7}, {row: 2, col: 7}],
                    blue: [{row: 8, col: 13}, {row: 8, col: 14}, {row: 7, col: 13}, {row: 7, col: 14}],
                    green: [{row: 13, col: 8}, {row: 14, col: 8}, {row: 13, col: 7}, {row: 14, col: 7}],
                    yellow: [{row: 8, col: 1}, {row: 8, col: 0}, {row: 7, col: 1}, {row: 7, col: 0}]
                };

                Object.keys(startPositions).forEach((color, playerIndex) => {
                    startPositions[color].forEach((pos, pieceIndex) => {
                        const piece = document.createElement('div');
                        piece.className = `player ${color}`;
                        piece.dataset.player = playerIndex;
                        piece.dataset.piece = pieceIndex;
                        piece.style.left = '0px';
                        piece.style.top = '0px';
                        
                        const cell = this.getCell(pos.row, pos.col);
                        if (cell) {
                            cell.appendChild(piece);
                        }
                    });
                });
            }

            bindEvents() {
                document.getElementById('rollBtn').addEventListener('click', () => this.rollDice());
                document.getElementById('resetBtn').addEventListener('click', () => this.resetGame());
                
                document.getElementById('board').addEventListener('click', (e) => {
                    if (e.target.classList.contains('player')) {
                        this.selectPiece(e.target);
                    }
                });
            }

            rollDice() {
                const dice = document.getElementById('dice');
                const rollBtn = document.getElementById('rollBtn');
                
                rollBtn.disabled = true;
                dice.classList.add('rolling');
                
                setTimeout(() => {
                    this.diceValue = Math.floor(Math.random() * 6) + 1;
                    dice.textContent = this.diceValue;
                    dice.classList.remove('rolling');
                    this.handleDiceRoll();
                }, 600);
            }

            handleDiceRoll() {
                const status = document.getElementById('status');
                status.textContent = `${this.players[this.currentPlayer].toUpperCase()} rolled a ${this.diceValue}`;
                
                if (this.diceValue === 6) {
                    status.textContent += ' - Roll again!';
                } else {
                    setTimeout(() => this.nextPlayer(), 1500);
                }
                
                document.getElementById('rollBtn').disabled = false;
            }

            selectPiece(piece) {
                if (this.selectedPiece) {
                    this.selectedPiece.classList.remove('active');
                }
                this.selectedPiece = piece;
                this.selectedPiece.classList.add('active');
            }

            nextPlayer() {
                this.currentPlayer = (this.currentPlayer + 1) % 4;
                this.selectedPiece = null;
                this.updateStatus();
                document.getElementById('rollBtn').disabled = false;
            }

            updateStatus() {
                const status = document.getElementById('status');
                status.textContent = `${this.players[this.currentPlayer].toUpperCase()}'s Turn`;
            }

            updatePlayerCounts() {
                ['red', 'blue', 'green', 'yellow'].forEach(color => {
                    document.getElementById(`${color}Count`).textContent = 
                        `${this.playerHomeCount[color]}/4 Home`;
                });
            }

            getCell(row, col) {
                return this.boardCells.find(cell => 
                    cell.row === row && cell.col === col
                )?.element;
            }

            resetGame() {
                location.reload();
            }
        }

        // Initialize game when page loads
        window.addEventListener('DOMContentLoaded', () => {
            new LudoGame();
        });
    </script>
</body>
  </html>
